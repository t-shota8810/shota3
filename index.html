<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スマホ風ガチャゲーム</title>

<style>
body{
    font-family: sans-serif;
    background: linear-gradient(180deg,#1e3c72,#2a5298);
    text-align:center;
    color:white;
    padding-top:50px;
}

h1{
    font-size:40px;
}

#gachaButton{
    font-size:24px;
    padding:15px 40px;
    border:none;
    border-radius:10px;
    background:gold;
    cursor:pointer;
}

#gachaButton:hover{
    transform:scale(1.1);
}

#result{
    margin-top:40px;
    font-size:30px;
    height:60px;
}

.common{color:#ddd;}
.rare{color:#4fc3f7;}
.superrare{color:#ba68c8;}
.ultra{color:#ffca28;}
.legend{color:#ff5252;}

#history{
    margin-top:30px;
    width:300px;
    margin-left:auto;
    margin-right:auto;
    background:rgba(0,0,0,0.3);
    padding:10px;
    border-radius:10px;
}

li{
    list-style:none;
}
</style>
</head>

<body>

<h1>🎮 スマホガチャ</h1>

<button id="gachaButton">ガチャを引く</button>

<div id="result">結果がここに表示されます</div>

<div id="history">
<h3>ガチャ履歴</h3>
<ul id="historyList"></ul>
</div>

<script>

const characters = [
{ name:"スライム", rarity:1 },
{ name:"兵士", rarity:1 },
{ name:"魔法使い", rarity:2 },
{ name:"騎士", rarity:2 },
{ name:"エリート剣士", rarity:3 },
{ name:"ドラゴンナイト", rarity:4 },
{ name:"伝説の勇者", rarity:5 }
];

function drawGacha(){

let rand = Math.random()*100;
let rarity;

if(rand < 40) rarity = 1;
else if(rand < 70) rarity = 2;
else if(rand < 90) rarity = 3;
else if(rand < 98) rarity = 4;
else rarity = 5;

let candidates = characters.filter(c => c.rarity === rarity);
let char = candidates[Math.floor(Math.random()*candidates.length)];

let stars = "★".repeat(rarity);

let resultDiv = document.getElementById("result");

let className = ["","common","rare","superrare","ultra","legend"][rarity];

resultDiv.className = className;
resultDiv.textContent = stars + " " + char.name;

addHistory(stars + " " + char.name);
}

function addHistory(text){
let li = document.createElement("li");
li.textContent = text;

let list = document.getElementById("historyList");
list.prepend(li);

if(list.children.length > 10){
list.removeChild(list.lastChild);
}
}

document.getElementById("gachaButton").onclick = drawGacha;

</script>

</body>
</html>
