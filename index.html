<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Shooting Game</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
}

#game{
display:block;
margin:auto;
background:black;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:20px;
}

</style>
</head>

<body>

<div id="ui">
SCORE : <span id="score">0</span>
<br>
LIFE : <span id="life">3</span>
</div>

<canvas id="game" width="400" height="600"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const WIDTH=canvas.width
const HEIGHT=canvas.height

let keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

let score=0
let life=3
let gameover=false

//================
// プレイヤー
//================

let player={
x:WIDTH/2,
y:HEIGHT-60,
speed:6,
power:1,
powerTimer:0
}

//================
// 弾
//================

let bullets=[]

//================
// 敵
//================

let enemies=[]

//================
// 爆発
//================

let explosions=[]

//================
// アイテム
//================

let items=[]

//================
// 敵生成
//================

function spawnEnemy(){

enemies.push({
x:Math.random()*WIDTH,
y:-20,
speed:2+Math.random()*2
})

}

setInterval(spawnEnemy,1000)

//================
// 発射
//================

function shoot(){

if(player.power==1){

bullets.push({x:player.x,y:player.y,vx:0})

}

if(player.power==2){

bullets.push({x:player.x,y:player.y,vx:-2})
bullets.push({x:player.x,y:player.y,vx:0})
bullets.push({x:player.x,y:player.y,vx:2})

}

}

//================
// 爆発生成
//================

function createExplosion(x,y){

explosions.push({
x:x,
y:y,
r:5,
life:20
})

}

//================
// 更新
//================

function update(){

if(gameover)return

//移動

if(keys["ArrowLeft"]) player.x-=player.speed
if(keys["ArrowRight"]) player.x+=player.speed

if(player.x<10)player.x=10
if(player.x>WIDTH-10)player.x=WIDTH-10

//弾

for(let b of bullets){

b.y-=8
b.x+=b.vx

}

bullets=bullets.filter(b=>b.y>-20)

//敵

for(let e of enemies){

e.y+=e.speed

}

//爆発

for(let ex of explosions){

ex.r+=2
ex.life--

}

explosions=explosions.filter(e=>e.life>0)

//アイテム

for(let it of items){

it.y+=3

if(Math.abs(it.x-player.x)<20 && Math.abs(it.y-player.y)<20){

player.power=2
player.powerTimer=600

it.dead=true

}

}

items=items.filter(i=>!i.dead && i.y<HEIGHT+20)

//パワー時間

if(player.powerTimer>0){

player.powerTimer--

if(player.powerTimer==0){

player.power=1

}

}

//敵削除

for(let i=enemies.length-1;i>=0;i--){

let e=enemies[i]

if(e.y>HEIGHT){

enemies.splice(i,1)

life--

document.getElementById("life").textContent=life

if(life<=0){

gameover=true
alert("GAME OVER")

}

}

}

//衝突判定

for(let i=enemies.length-1;i>=0;i--){

for(let j=bullets.length-1;j>=0;j--){

let e=enemies[i]
let b=bullets[j]

if(Math.abs(e.x-b.x)<15 && Math.abs(e.y-b.y)<15){

createExplosion(e.x,e.y)

if(Math.random()<0.2){

items.push({x:e.x,y:e.y})

}

enemies.splice(i,1)
bullets.splice(j,1)

score+=10
document.getElementById("score").textContent=score

break

}

}

}

}

//================
// 描画
//================

function draw(){

ctx.fillStyle="black"
ctx.fillRect(0,0,WIDTH,HEIGHT)

//プレイヤー

ctx.fillStyle="cyan"
ctx.fillRect(player.x-15,player.y-15,30,30)

//弾

ctx.fillStyle="yellow"

for(let b of bullets){

ctx.fillRect(b.x-3,b.y-10,6,10)

}

//敵

ctx.fillStyle="red"

for(let e of enemies){

ctx.fillRect(e.x-15,e.y-15,30,30)

}

//爆発

for(let ex of explosions){

ctx.beginPath()
ctx.arc(ex.x,ex.y,ex.r,0,Math.PI*2)
ctx.fillStyle="orange"
ctx.fill()

}

//アイテム

ctx.fillStyle="lime"

for(let it of items){

ctx.beginPath()
ctx.arc(it.x,it.y,8,0,Math.PI*2)
ctx.fill()

}

}

//================
// 連射制御
//================

let shootTimer=0

function gameLoop(){

update()
draw()

shootTimer++

if(keys[" "] && shootTimer>10){

shoot()
shootTimer=0

}

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>
</body>
</html>
