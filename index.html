<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Top View Race Game</title>
<style>
body{
    margin:0;
    background:#222;
    overflow:hidden;
    font-family:sans-serif;
}

#game{
    display:block;
    margin:auto;
    background:#3aa655;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:20px;
    background:rgba(0,0,0,0.5);
    padding:5px 10px;
    border-radius:8px;
}
</style>
</head>

<body>

<div id="ui">TIME: <span id="time">0.00</span></div>
<canvas id="game" width="400" height="600"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const WIDTH = canvas.width;
const HEIGHT = canvas.height;

let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

let car = {
    x: WIDTH/2,
    y: HEIGHT-120,
    speed:0,
    angle:0
};

let trackOffset = 0;

let startTime = Date.now();
let finished = false;

const trackLength = 5000;

function update(){

    if(finished) return;

    if(keys["ArrowUp"]) car.speed += 0.2;
    if(keys["ArrowDown"]) car.speed -= 0.2;

    car.speed *= 0.98;

    if(keys["ArrowLeft"]) car.angle -= 0.05 * car.speed;
    if(keys["ArrowRight"]) car.angle += 0.05 * car.speed;

    if(car.speed > 8) car.speed = 8;
    if(car.speed < -4) car.speed = -4;

    car.x += Math.sin(car.angle) * car.speed;
    trackOffset += Math.cos(car.angle) * car.speed;

    if(car.x < 60) car.x = 60;
    if(car.x > WIDTH-60) car.x = WIDTH-60;

    if(trackOffset > trackLength){
        finished = true;
        alert("GOAL! TIME: " + document.getElementById("time").textContent + " 秒");
    }

}

function drawTrack(){

    ctx.fillStyle="#3aa655";
    ctx.fillRect(0,0,WIDTH,HEIGHT);

    ctx.fillStyle="#555";
    ctx.fillRect(60,0,WIDTH-120,HEIGHT);

    ctx.strokeStyle="white";
    ctx.lineWidth=4;

    for(let i=-20;i<HEIGHT;i+=40){
        ctx.beginPath();
        ctx.moveTo(WIDTH/2,i + (trackOffset % 40));
        ctx.lineTo(WIDTH/2,i+20 + (trackOffset % 40));
        ctx.stroke();
    }

}

function drawCar(){

    ctx.save();

    ctx.translate(car.x,car.y);
    ctx.rotate(car.angle);

    ctx.fillStyle="red";
    ctx.fillRect(-10,-20,20,40);

    ctx.fillStyle="black";
    ctx.fillRect(-10,-20,20,8);

    ctx.restore();
}

function draw(){

    drawTrack();
    drawCar();
}

function updateTimer(){

    if(finished) return;

    let t = (Date.now() - startTime)/1000;
    document.getElementById("time").textContent = t.toFixed(2);
}

function gameLoop(){

    update();
    draw();
    updateTimer();

    requestAnimationFrame(gameLoop);
}

gameLoop();

</script>
</body>
</html>
