<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Shooting Game</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
text-align:center;
}

#game{
display:block;
margin:auto;
background:black;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:20px;
}

#retry{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:15px 40px;
font-size:20px;
display:none;
cursor:pointer;
}

</style>
</head>

<body>

<div id="ui">
SCORE : <span id="score">0</span><br>
LIFE : <span id="life">3</span>
</div>

<button id="retry">RETRY</button>

<canvas id="game" width="400" height="600"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const WIDTH=canvas.width
const HEIGHT=canvas.height

let keys={}
document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

const retryBtn=document.getElementById("retry")

retryBtn.onclick=resetGame

let player
let bullets
let enemies
let explosions
let items
let score
let life
let gameover

function resetGame(){

player={
x:WIDTH/2,
y:HEIGHT-60,
speed:6,
power:1,
powerTimer:0
}

bullets=[]
enemies=[]
explosions=[]
items=[]

score=0
life=3
gameover=false

document.getElementById("score").textContent=0
document.getElementById("life").textContent=3

retryBtn.style.display="none"

}

resetGame()

//敵生成

function spawnEnemy(){

if(gameover)return

enemies.push({
x:Math.random()*WIDTH,
y:-20,
speed:2+Math.random()*2
})

}

setInterval(spawnEnemy,1000)

//発射

function shoot(){

if(player.power==1){

bullets.push({x:player.x,y:player.y,vx:0})

}

if(player.power==2){

bullets.push({x:player.x,y:player.y,vx:-2})
bullets.push({x:player.x,y:player.y,vx:0})
bullets.push({x:player.x,y:player.y,vx:2})

}

}

//爆発

function createExplosion(x,y){

explosions.push({
x:x,
y:y,
r:5,
life:20
})

}

//更新

function update(){

if(gameover)return

if(keys["ArrowLeft"]) player.x-=player.speed
if(keys["ArrowRight"]) player.x+=player.speed

if(player.x<10)player.x=10
if(player.x>WIDTH-10)player.x=WIDTH-10

//弾

for(let b of bullets){

b.y-=8
b.x+=b.vx

}

bullets=bullets.filter(b=>b.y>-20)

//敵

for(let e of enemies){

e.y+=e.speed

if(Math.abs(e.x-player.x)<20 && Math.abs(e.y-player.y)<20){

gameover=true
retryBtn.style.display="block"

}

}

//爆発

for(let ex of explosions){

ex.r+=2
ex.life--

}

explosions=explosions.filter(e=>e.life>0)

//アイテム

for(let it of items){

it.y+=3

if(Math.abs(it.x-player.x)<20 && Math.abs(it.y-player.y)<20){

player.power=2
player.powerTimer=600
it.dead=true

}

}

items=items.filter(i=>!i.dead && i.y<HEIGHT+20)

//パワー時間

if(player.powerTimer>0){

player.powerTimer--

if(player.powerTimer==0){

player.power=1

}

}

//衝突

for(let i=enemies.length-1;i>=0;i--){

for(let j=bullets.length-1;j>=0;j--){

let e=enemies[i]
let b=bullets[j]

if(Math.abs(e.x-b.x)<15 && Math.abs(e.y-b.y)<15){

createExplosion(e.x,e.y)

if(Math.random()<0.2){

items.push({x:e.x,y:e.y})

}

enemies.splice(i,1)
bullets.splice(j,1)

score+=10
document.getElementById("score").textContent=score

break

}

}

}

}

//描画

function draw(){

ctx.fillStyle="black"
ctx.fillRect(0,0,WIDTH,HEIGHT)

//プレイヤー（宇宙船）

ctx.fillStyle="cyan"

ctx.beginPath()
ctx.moveTo(player.x,player.y-20)
ctx.lineTo(player.x-15,player.y+20)
ctx.lineTo(player.x+15,player.y+20)
ctx.closePath()
ctx.fill()

//弾

ctx.fillStyle="yellow"

for(let b of bullets){

ctx.fillRect(b.x-2,b.y-10,4,10)

}

//敵（六角形）

ctx.fillStyle="red"

for(let e of enemies){

ctx.beginPath()

ctx.moveTo(e.x,e.y-15)
ctx.lineTo(e.x-15,e.y)
ctx.lineTo(e.x-10,e.y+15)
ctx.lineTo(e.x+10,e.y+15)
ctx.lineTo(e.x+15,e.y)
ctx.closePath()

ctx.fill()

}

//爆発

for(let ex of explosions){

let g=ctx.createRadialGradient(ex.x,ex.y,0,ex.x,ex.y,ex.r)

g.addColorStop(0,"yellow")
g.addColorStop(0.5,"orange")
g.addColorStop(1,"red")

ctx.fillStyle=g

ctx.beginPath()
ctx.arc(ex.x,ex.y,ex.r,0,Math.PI*2)
ctx.fill()

}

//アイテム（星）

ctx.fillStyle="lime"

for(let it of items){

ctx.beginPath()

for(let i=0;i<5;i++){

let angle=i*2*Math.PI/5

ctx.lineTo(
it.x+Math.cos(angle)*10,
it.y+Math.sin(angle)*10
)

}

ctx.closePath()
ctx.fill()

}

}

//連射

let shootTimer=0

function gameLoop(){

update()
draw()

shootTimer++

if(keys[" "] && shootTimer>10){

shoot()
shootTimer=0

}

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
