<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Space Shooter Ultimate</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
color:white;
text-align:center;
}

#game{
display:block;
margin:auto;
background:black;
}

#ui{
position:absolute;
top:10px;
left:10px;
font-size:16px;
}

#title{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
}

button{
padding:12px 30px;
font-size:20px;
cursor:pointer;
}

#retry{
position:absolute;
top:60%;
left:50%;
transform:translate(-50%,-50%);
display:none;
}

#mobile{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
gap:40px;
}

.mobileBtn{
width:70px;
height:70px;
font-size:30px;
opacity:0.6;
}

</style>
</head>

<body>

<div id="ui">
SCORE <span id="score">0</span><br>
LIFE <span id="life">3</span><br>
HI <span id="hiscore">0</span>
</div>

<div id="title">
<h1>SPACE SHOOTER</h1>
<button onclick="startGame()">START</button>
</div>

<button id="retry" onclick="resetGame()">RETRY</button>

<canvas id="game" width="400" height="600"></canvas>

<div id="mobile">
<button class="mobileBtn" ontouchstart="keys.left=true" ontouchend="keys.left=false">◀</button>
<button class="mobileBtn" ontouchstart="shooting=true" ontouchend="shooting=false">🔥</button>
<button class="mobileBtn" ontouchstart="keys.right=true" ontouchend="keys.right=false">▶</button>
</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const W=canvas.width
const H=canvas.height

let keys={left:false,right:false}
let shooting=false

document.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft")keys.left=true
if(e.key==="ArrowRight")keys.right=true
if(e.key===" ")shooting=true
})

document.addEventListener("keyup",e=>{
if(e.key==="ArrowLeft")keys.left=false
if(e.key==="ArrowRight")keys.right=false
if(e.key===" ")shooting=false
})

let score=0
let life=3
let hiscore=localStorage.getItem("hiscore")||0
document.getElementById("hiscore").textContent=hiscore

let state="title"

let player,bullets,enemies,enemyBullets,particles,items,stars,boss

function startGame(){
document.getElementById("title").style.display="none"
resetGame()
state="game"
}

function resetGame(){

player={x:200,y:520,power:1,shield:false}

bullets=[]
enemyBullets=[]
enemies=[]
particles=[]
items=[]

boss=null

stars=[]
for(let i=0;i<120;i++){
stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2})
}

score=0
life=3

document.getElementById("score").textContent=score
document.getElementById("life").textContent=life

document.getElementById("retry").style.display="none"

}

//BGM

const audio=new AudioContext()

function beep(freq,duration){
let o=audio.createOscillator()
let g=audio.createGain()

o.connect(g)
g.connect(audio.destination)

o.frequency.value=freq
o.start()

g.gain.setValueAtTime(0.1,audio.currentTime)
g.gain.exponentialRampToValueAtTime(0.001,audio.currentTime+duration)

o.stop(audio.currentTime+duration)
}

//敵生成

setInterval(()=>{

if(state!=="game")return
if(boss)return

let type=Math.floor(Math.random()*3)

enemies.push({

x:Math.random()*W,
y:-20,
type:type,
hp:type+1,
cool:60

})

},800)

//発射

function shoot(){

beep(600,0.05)

if(player.power===1){

bullets.push({x:player.x,y:player.y,vx:0})

}

if(player.power===2){

bullets.push({x:player.x,y:player.y,vx:-2})
bullets.push({x:player.x,y:player.y,vx:0})
bullets.push({x:player.x,y:player.y,vx:2})

}

if(player.power===3){

bullets.push({x:player.x,y:player.y,laser:true})

}

}

//爆発

function explode(x,y){

beep(120,0.2)

for(let i=0;i<20;i++){

particles.push({

x:x,
y:y,
vx:(Math.random()-0.5)*4,
vy:(Math.random()-0.5)*4,
life:30

})

}

}

//更新

function update(){

if(state!=="game")return

//星

for(let s of stars){

s.y+=s.s
if(s.y>H){s.y=0;s.x=Math.random()*W}

}

//移動

if(keys.left)player.x-=5
if(keys.right)player.x+=5

player.x=Math.max(10,Math.min(W-10,player.x))

//弾

for(let b of bullets){

if(b.laser){

}else{

b.y-=8
b.x+=b.vx

}

}

bullets=bullets.filter(b=>b.y>-20)

//敵

for(let e of enemies){

e.y+=2+e.type

e.cool--

if(e.cool<0){

enemyBullets.push({x:e.x,y:e.y})
e.cool=100

}

}

//敵弾

for(let b of enemyBullets){

b.y+=4

if(Math.abs(b.x-player.x)<15 && Math.abs(b.y-player.y)<15){

hit()

}

}

//衝突

for(let i=enemies.length-1;i>=0;i--){

for(let j=bullets.length-1;j>=0;j--){

let e=enemies[i]
let b=bullets[j]

if(Math.abs(e.x-b.x)<15 && Math.abs(e.y-b.y)<15){

e.hp--

if(!b.laser)bullets.splice(j,1)

if(e.hp<=0){

explode(e.x,e.y)

if(Math.random()<0.3){

items.push({x:e.x,y:e.y,type:Math.floor(Math.random()*3)})

}

enemies.splice(i,1)

score+=10
document.getElementById("score").textContent=score

}

break

}

}

}

//ボス

if(score>600 && !boss){

boss={x:200,y:100,hp:200,dir:2}

}

if(boss){

boss.x+=boss.dir

if(boss.x<50||boss.x>350)boss.dir*=-1

}

//パーティクル

for(let p of particles){

p.x+=p.vx
p.y+=p.vy
p.life--

}

particles=particles.filter(p=>p.life>0)

}

//被弾

function hit(){

if(player.shield){

player.shield=false
return

}

life--

document.getElementById("life").textContent=life

if(life<=0){

gameover()

}

}

function gameover(){

state="gameover"

if(score>hiscore){

hiscore=score
localStorage.setItem("hiscore",hiscore)
document.getElementById("hiscore").textContent=hiscore

}

document.getElementById("retry").style.display="block"

}

//描画

function draw(){

ctx.fillStyle="black"
ctx.fillRect(0,0,W,H)

//星

ctx.fillStyle="white"

for(let s of stars){

ctx.fillRect(s.x,s.y,s.s,s.s)

}

//プレイヤー

ctx.fillStyle="cyan"

ctx.beginPath()
ctx.moveTo(player.x,player.y-20)
ctx.lineTo(player.x-15,player.y+20)
ctx.lineTo(player.x+15,player.y+20)
ctx.fill()

if(player.shield){

ctx.strokeStyle="blue"
ctx.beginPath()
ctx.arc(player.x,player.y,30,0,Math.PI*2)
ctx.stroke()

}

//弾

ctx.fillStyle="yellow"

for(let b of bullets){

if(b.laser){

ctx.fillRect(b.x-2,0,4,b.y)

}else{

ctx.fillRect(b.x-2,b.y-10,4,10)

}

}

//敵

ctx.fillStyle="red"

for(let e of enemies){

ctx.fillRect(e.x-12,e.y-12,24,24)

}

//敵弾

ctx.fillStyle="orange"

for(let b of enemyBullets){

ctx.beginPath()
ctx.arc(b.x,b.y,4,0,Math.PI*2)
ctx.fill()

}

//ボス

if(boss){

ctx.fillStyle="purple"
ctx.fillRect(boss.x-60,boss.y-40,120,80)

ctx.fillStyle="white"
ctx.fillRect(boss.x-60,boss.y-60,boss.hp/2,8)

}

//爆発

ctx.fillStyle="orange"

for(let p of particles){

ctx.fillRect(p.x,p.y,3,3)

}

//アイテム

for(let it of items){

ctx.fillStyle=["lime","cyan","blue"][it.type]

ctx.beginPath()
ctx.arc(it.x,it.y,8,0,Math.PI*2)
ctx.fill()

}

}

//ゲームループ

let shootTimer=0

function loop(){

update()
draw()

shootTimer++

if(shooting && shootTimer>10){

shoot()
shootTimer=0

}

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
