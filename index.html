<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>落ちゲーパズル（スコア・連鎖付き）</title>
<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: sans-serif;
}
canvas {
  background: #000;
  display: block;
  margin: 20px auto;
  border: 2px solid #fff;
}
#info { margin-top: 10px; }
</style>
</head>
<body>
<h1>落ちゲーパズル</h1>
<p>← → 移動 / ↑ 回転 / ↓ 加速</p>
<canvas id="game" width="240" height="480"></canvas>
<div id="info">スコア: <span id="score">0</span> / 連鎖: <span id="combo">0</span></div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const COLS = 6;
const ROWS = 12;
const SIZE = 40;

const COLORS = ["red", "blue", "green", "yellow", "purple"];

let board = Array.from({length: ROWS}, () => Array(COLS).fill(null));
let piece = null;

let score = 0;
let combo = 0;

function updateUI(){
  document.getElementById('score').textContent = score;
  document.getElementById('combo').textContent = combo;
}

function newPiece() {
  const c1 = COLORS[Math.floor(Math.random() * COLORS.length)];
  const c2 = COLORS[Math.floor(Math.random() * COLORS.length)];
  return {
    x: 2,
    y: 0,
    blocks: [[0,0,c1],[0,1,c2]]
  };
}

function drawBlock(x,y,color){
  ctx.fillStyle = color;
  ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
  ctx.strokeStyle = "black";
  ctx.strokeRect(x*SIZE,y*SIZE,SIZE,SIZE);
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      if(board[y][x]) drawBlock(x,y,board[y][x]);
    }
  }

  if(piece){
    piece.blocks.forEach(b=>{
      drawBlock(piece.x+b[0], piece.y+b[1], b[2]);
    });
  }
}

function collide(px,py,blocks){
  return blocks.some(b=>{
    let x = px + b[0];
    let y = py + b[1];
    return x<0 || x>=COLS || y>=ROWS || (y>=0 && board[y][x]);
  });
}

function merge(){
  piece.blocks.forEach(b=>{
    let x = piece.x + b[0];
    let y = piece.y + b[1];
    if(y>=0) board[y][x] = b[2];
  });
}

function rotate(){
  const rotated = piece.blocks.map(b=>[-b[1], b[0], b[2]]);
  if(!collide(piece.x, piece.y, rotated)){
    piece.blocks = rotated;
  }
}

function clearMatches(){
  let visited = Array.from({length: ROWS},()=>Array(COLS).fill(false));
  let toClear = [];

  function dfs(x,y,color,group){
    if(x<0||x>=COLS||y<0||y>=ROWS) return;
    if(visited[y][x] || board[y][x] !== color) return;
    visited[y][x]=true;
    group.push([x,y]);
    dfs(x+1,y,color,group);
    dfs(x-1,y,color,group);
    dfs(x,y+1,color,group);
    dfs(x,y-1,color,group);
  }

  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      if(board[y][x] && !visited[y][x]){
        let group=[];
        dfs(x,y,board[y][x],group);
        if(group.length>=4) toClear.push(...group);
      }
    }
  }

  toClear.forEach(([x,y])=>board[y][x]=null);

  if(toClear.length>0){
    // スコア加算（連鎖倍率）
    score += toClear.length * 10 * (combo+1);
  }

  return toClear.length>0;
}

function drop(){
  let moved = false;
  for(let x=0;x<COLS;x++){
    for(let y=ROWS-1;y>=0;y--){
      if(!board[y][x]){
        for(let k=y-1;k>=0;k--){
          if(board[k][x]){
            board[y][x]=board[k][x];
            board[k][x]=null;
            moved = true;
            break;
          }
        }
      }
    }
  }
  return moved;
}

function applyGravityFully(){
  while(drop()){}
}

function resolveChains(){
  combo = 0;
  let chainOccurred = false;

  while(true){
    applyGravityFully();
    if(clearMatches()){
      combo++;
      chainOccurred = true;
    } else {
      break;
    }
  }

  if(!chainOccurred) combo = 0;
  updateUI();
}

function update(){
  if(!piece) piece = newPiece();

  if(!collide(piece.x, piece.y+1, piece.blocks)){
    piece.y++;
  } else {
    merge();
    resolveChains();
    piece = newPiece();

    if(collide(piece.x, piece.y, piece.blocks)){
      alert("ゲームオーバー\nスコア: " + score);
      board = Array.from({length: ROWS}, () => Array(COLS).fill(null));
      score = 0;
      combo = 0;
      updateUI();
    }
  }

  draw();
}

setInterval(update, 500);

window.addEventListener('keydown', e=>{
  if(!piece) return;

  if(e.key === 'ArrowLeft'){
    if(!collide(piece.x-1,piece.y,piece.blocks)) piece.x--;
  }
  if(e.key === 'ArrowRight'){
    if(!collide(piece.x+1,piece.y,piece.blocks)) piece.x++;
  }
  if(e.key === 'ArrowDown'){
    if(!collide(piece.x,piece.y+1,piece.blocks)) piece.y++;
  }
  if(e.key === 'ArrowUp'){
    rotate();
  }

  draw();
});
</script>
</body>
</html>
